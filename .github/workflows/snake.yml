name: Generate GitHub Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Generate purple contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ritopsis
          outputs: |
            dist/github-snake-purple.svg?palette=github-light&color_snake=#3b34cb
            dist/github-snake-purple-dark.svg?palette=github-dark&color_snake=#3b34cb

      - name: Push snake to gh-pages branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          target_branch: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
